name: nekocafe

services:
  postgres:
    image: postgres:16-alpine
    container_name: nekocafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nekocafe-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  reservation:
    build: ./services/reservation
    container_name: nekocafe-reservation
    restart: unless-stopped
    environment:
      SERVICE_NAME: reservation-service
      SERVICE_VERSION: v1.0.0
      RELEASE_CHANNEL: stable
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: reservation
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      EVENT_BUS_MODE: outbox
      EVENT_BUS_NAME: rocketmq
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      ACCESS_LOG_LEVEL: info
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_PROMETHEUS_PORT: 9464
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  member:
    build: ./services/member
    container_name: nekocafe-member
    restart: unless-stopped
    environment:
      SERVICE_NAME: member-service
      SERVICE_VERSION: v1.0.0
      RELEASE_CHANNEL: stable
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: member
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      EVENT_BUS_MODE: outbox
      EVENT_BUS_NAME: rocketmq
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      ACCESS_LOG_LEVEL: info
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_PROMETHEUS_PORT: 9464
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: nekocafe-rocketmq-namesrv
    profiles: ["mq"]
    command: ["sh", "mqnamesrv"]
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: nekocafe-rocketmq-broker
    profiles: ["mq"]
    command: ["sh", "mqbroker", "-n", "rocketmq-namesrv:9876", "--enable-proxy"]
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"

volumes:
  postgres-data:
  redis-data:
