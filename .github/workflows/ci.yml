name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify Monorepo PoC
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JWT_SECRET: replace-with-a-local-dev-secret
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            services/reservation/package-lock.json
            services/member/package-lock.json

      - name: Prepare local environment file
        run: cp .env.example .env

      - name: Create artifact workspace
        run: mkdir -p artifacts

      - name: Install reservation dependencies
        working-directory: services/reservation
        run: npm ci

      - name: Install member dependencies
        working-directory: services/member
        run: npm ci

      - name: Lint services
        run: |
          npm --prefix services/reservation run lint
          npm --prefix services/member run lint

      - name: Run unit tests
        run: |
          npm --prefix services/reservation test
          npm --prefix services/member test

      - name: Dependency audit
        run: |
          npm audit --prefix services/reservation --omit=dev --audit-level=high
          npm audit --prefix services/member --omit=dev --audit-level=high

      - name: Build Docker images
        run: docker compose build reservation member

      - name: Scan reservation image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: nekocafe-reservation:latest
          format: table
          output: artifacts/trivy-reservation.txt
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Scan member image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: nekocafe-member:latest
          format: table
          output: artifacts/trivy-member.txt
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Start local stack
        run: docker compose up -d postgres redis reservation member

      - name: Wait for container health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8081/healthz >/dev/null && curl --fail --silent http://localhost:8082/healthz >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Services did not become healthy in time."
          docker compose ps
          exit 1

      - name: Run authenticated smoke tests
        run: |
          TOKEN="$(node scripts/generate-jwt.mjs)"
          curl --fail --silent http://localhost:8081/healthz | tee artifacts/reservation-health.json
          curl --fail --silent http://localhost:8082/healthz | tee artifacts/member-health.json
          curl --fail --silent \
            -H "Authorization: Bearer ${TOKEN}" \
            "http://localhost:8081/reservation/v1/availability?storeId=STORE-BJ-001&date=2026-05-10&partySize=4" \
            | tee artifacts/reservation-availability.json \
            | grep '"slots"'
          curl --fail --silent \
            -H "Authorization: Bearer ${TOKEN}" \
            "http://localhost:8082/member/v1/members/MEM-220501208" \
            | tee artifacts/member-profile.json \
            | grep '"memberId":"MEM-220501208"'

      - name: Capture compose state
        if: always()
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/compose-ps.txt
          docker compose logs --no-color reservation member postgres redis > artifacts/compose.log

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence
          path: artifacts/
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans
