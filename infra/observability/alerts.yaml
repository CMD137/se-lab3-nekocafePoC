groups:
  - name: nekocafe-reservation-alerts
    rules:
      - alert: ReservationHighP95
        expr: histogram_quantile(0.95, sum by (le, release_channel) (rate(nekocafe_http_server_duration_ms_bucket{service_name="reservation-service"}[5m]))) > 800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Reservation API P95 is above 800ms.
      - alert: ReservationHighErrorRate
        expr: sum by (release_channel) (rate(nekocafe_http_server_requests_total{service_name="reservation-service",status_code=~"5.."}[5m])) / clamp_min(sum by (release_channel) (rate(nekocafe_http_server_requests_total{service_name="reservation-service"}[5m])), 0.0001) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Reservation API error rate is above 1%.
  - name: nekocafe-platform-alerts
    rules:
      - alert: ServiceHighMemory
        expr: avg by (service_name, release_channel) (nekocafe_process_memory_rss_bytes{service_name=~"reservation-service|member-service"}) > 4e8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Application process memory usage is above 400MB.
      - alert: ServiceNotReady
        expr: up{job=~"reservation|member|reservation-rollout"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: One or more NekoCafe services are not being scraped by Prometheus.
