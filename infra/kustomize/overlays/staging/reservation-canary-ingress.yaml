apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reservation-canary
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "5"
spec:
  ingressClassName: nginx
  rules:
    - host: nekocafe.local
      http:
        paths:
          - path: /reservation/v1
            pathType: Prefix
            backend:
              service:
                name: reservation-canary
                port:
                  number: 80
